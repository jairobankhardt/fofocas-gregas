<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fofocas Gregas — Ciclo Troiano</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/css/mapa-crimson.css" />
    </head>
    <body>
        <div id="header">
            <div class="header-top">
                <div class="header-left">
                    <h1>🎭 Fofocas Gregas</h1>
                    <p>Ciclo Troiano — Mapa de Relações</p>
                </div>
                <div class="header-controls">
                    <button class="btn" onclick="resetView()">
                        &#8635; Resetar
                    </button>
                    <button class="btn" onclick="toggleLabels()">
                        Rótulos
                    </button>
                </div>
            </div>
            <nav class="site-nav" data-shared-menu></nav>
        </div>

        <div id="legend">
            <h3>Legenda</h3>
            <div class="leg-item">
                <div class="leg-dot" style="background: #e8c472"></div>
                Família Real de Troia
            </div>
            <div class="leg-item">
                <div class="leg-dot" style="background: #7eb8d4"></div>
                Gregos / Aqueus
            </div>
            <div class="leg-item">
                <div class="leg-dot" style="background: #d4a0d4"></div>
                Deuses
            </div>
            <div class="leg-item">
                <div class="leg-dot" style="background: #a8d4a0"></div>
                Figuras Mistas
            </div>
            <div style="margin-top: 10px">
                <div class="leg-item">
                    <div class="leg-line" style="background: #e8c472"></div>
                    Família (sangue)
                </div>
                <div class="leg-item">
                    <div class="leg-line" style="background: #e87272"></div>
                    Conflito/Inimizade
                </div>
                <div class="leg-item">
                    <div
                        class="leg-line"
                        style="
                            background: #7eb8d4;
                            height: 2px;
                            border-top: 2px dashed #7eb8d4;
                            background: none;
                        "
                    ></div>
                    Amor/Casamento
                </div>
                <div class="leg-item">
                    <div class="leg-line" style="background: #d4a0d4"></div>
                    Intervenção divina
                </div>
            </div>
        </div>

        <div id="info-panel">
            <button id="info-close" onclick="closeInfo()">✕</button>
            <div id="info-name"></div>
            <div id="info-role"></div>
            <div id="info-desc"></div>
            <div id="info-obras">
                <h4>Aparece em</h4>
                <div id="info-obras-list"></div>
            </div>
        </div>

        <div id="hint">
            Arraste para mover · Scroll para zoom<br />
            Clique num personagem para detalhes
        </div>

        <svg id="canvas"></svg>

        <script src="assets/js/menu-links.js"></script>
        <script src="assets/js/utils.js"></script>
        <script>
            fetch('assets/data/maps/ciclo-troiano.json')
                .then(r => r.json())
                .then(data => {
                    const nodes = data.nodes;
                    const edges = data.edges;


                // ─── RENDER ─────────────────────────────────────────────────────────────────

                const svg = document.getElementById("canvas");
                const W = window.innerWidth,
                    H = window.innerHeight;
                svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

                let transform = { x: 0, y: 0, scale: 1 };
                let showLabels = true;
                let dragging = false,
                    dragStart = null,
                    transformStart = null;
                let selectedNode = null;

                const groupColors = {
                    troia: "#C9973A",
                    grego: "#7EB8D4",
                    deus: "#C8A0D4",
                    misto: "#A0D4A8",
                };
                const groupFill = {
                    troia: "rgba(201,151,58,0.18)",
                    grego: "rgba(126,184,212,0.15)",
                    deus: "rgba(200,160,212,0.15)",
                    misto: "rgba(160,212,168,0.15)",
                };
                const edgeColors = {
                    familia: "#C9973A",
                    amor: "#7EB8D4",
                    conflito: "#E87272",
                    divino: "#C8A0D4",
                };

                const ns = MapUtils.ns;

                // defs
                const defs = ns("defs");

                // arrow markers
                ["familia", "amor", "conflito", "divino"].forEach((type) => {
                    const mk = ns("marker", {
                        id: `arr-${type}`,
                        markerWidth: 8,
                        markerHeight: 8,
                        refX: 18,
                        refY: 3,
                        orient: "auto",
                    });
                    const path = ns("path", {
                        d: "M0,0 L0,6 L8,3 z",
                        fill: edgeColors[type],
                        opacity: "0.7",
                    });
                    mk.appendChild(path);
                    defs.appendChild(mk);
                });

                // glow filter
                const flt = ns("filter", {
                    id: "glow",
                    x: "-30%",
                    y: "-30%",
                    width: "160%",
                    height: "160%",
                });
                const fe1 = ns("feGaussianBlur", {
                    stdDeviation: "4",
                    result: "blur",
                });
                const fe2 = ns("feComposite", {
                    in: "SourceGraphic",
                    in2: "blur",
                    operator: "over",
                });
                flt.appendChild(fe1);
                flt.appendChild(fe2);
                defs.appendChild(flt);

                // selected glow
                const flt2 = ns("filter", {
                    id: "glow2",
                    x: "-50%",
                    y: "-50%",
                    width: "200%",
                    height: "200%",
                });
                const fe3 = ns("feGaussianBlur", {
                    stdDeviation: "8",
                    result: "blur",
                });
                const fe4 = ns("feComposite", {
                    in: "SourceGraphic",
                    in2: "blur",
                    operator: "over",
                });
                flt2.appendChild(fe3);
                flt2.appendChild(fe4);
                defs.appendChild(flt2);

                svg.appendChild(defs);

                // main group (transformable)
                const g = ns("g", { id: "main" });
                svg.appendChild(g);

                const edgeGroup = ns("g");
                const nodeGroup = ns("g");
                g.appendChild(edgeGroup);
                g.appendChild(nodeGroup);

                // draw edges
                const edgeEls = {};
                edges.forEach((e) => {
                    const src = nodes.find((n) => n.id === e.s);
                    const tgt = nodes.find((n) => n.id === e.t);
                    if (!src || !tgt) return;

                    const dx = tgt.x - src.x,
                        dy = tgt.y - src.y;
                    const mx = src.x + dx * 0.5 + dy * 0.15;
                    const my = src.y + dy * 0.5 - dx * 0.15;

                    const path = ns("path", {
                        d: `M${src.x},${src.y} Q${mx},${my} ${tgt.x},${tgt.y}`,
                        fill: "none",
                        stroke: edgeColors[e.type],
                        "stroke-width": e.type === "conflito" ? 2 : 1.5,
                        "stroke-dasharray":
                            e.type === "amor"
                                ? "5,4"
                                : e.type === "divino"
                                  ? "2,3"
                                  : "none",
                        opacity: 0.4,
                        "marker-end": `url(#arr-${e.type})`,
                    });
                    path.dataset.edge = `${e.s}-${e.t}`;
                    edgeGroup.appendChild(path);

                    // edge label (hidden by default, shows on hover)
                    const lbl = ns("text", {
                        x: mx,
                        y: my,
                        "text-anchor": "middle",
                        "font-family": "IM Fell English, Georgia, serif",
                        "font-size": "9",
                        "font-style": "italic",
                        fill: edgeColors[e.type],
                        opacity: 0,
                        "pointer-events": "none",
                    });
                    lbl.textContent = e.label;
                    lbl.dataset.edgelabel = `${e.s}-${e.t}`;
                    edgeGroup.appendChild(lbl);

                    edgeEls[`${e.s}-${e.t}`] = { path, lbl };
                });

                // draw nodes
                const nodeEls = {};
                nodes.forEach((node) => {
                    const grp = ns("g", { cursor: "pointer" });
                    grp.dataset.id = node.id;

                    // outer glow ring (hidden)
                    const ring = ns("circle", {
                        cx: node.x,
                        cy: node.y,
                        r: 26,
                        fill: "none",
                        stroke: groupColors[node.group],
                        "stroke-width": 1.5,
                        opacity: 0,
                        filter: "url(#glow)",
                    });
                    grp.appendChild(ring);

                    // bg circle
                    const circle = ns("circle", {
                        cx: node.x,
                        cy: node.y,
                        r: 20,
                        fill: groupFill[node.group],
                        stroke: groupColors[node.group],
                        "stroke-width": 1.5,
                    });
                    grp.appendChild(circle);

                    // icon char (first letter)
                    const icon = ns("text", {
                        x: node.x,
                        y: node.y + 5,
                        "text-anchor": "middle",
                        "font-family": "Cinzel, serif",
                        "font-size": "13",
                        "font-weight": "700",
                        fill: groupColors[node.group],
                        "pointer-events": "none",
                    });
                    icon.textContent = node.label[0];
                    grp.appendChild(icon);

                    // label
                    const label = ns("text", {
                        x: node.x,
                        y: node.y + 34,
                        "text-anchor": "middle",
                        "font-family": "Cinzel, serif",
                        "font-size": "10",
                        "font-weight": "600",
                        fill: "#F5E6C0",
                        opacity: showLabels ? 0.9 : 0,
                        "pointer-events": "none",
                    });
                    label.textContent = node.label;
                    grp.appendChild(label);

                    // role sublabel
                    const role = ns("text", {
                        x: node.x,
                        y: node.y + 46,
                        "text-anchor": "middle",
                        "font-family": "IM Fell English, serif",
                        "font-size": "8",
                        "font-style": "italic",
                        fill: groupColors[node.group],
                        opacity: showLabels ? 0.6 : 0,
                        "pointer-events": "none",
                    });
                    role.textContent = node.role;
                    grp.appendChild(role);

                    nodeGroup.appendChild(grp);
                    nodeEls[node.id] = { grp, circle, ring, label, role };

                    // hover
                    grp.addEventListener("mouseenter", () => {
                        if (selectedNode === node.id) return;
                        circle.setAttribute("r", 23);
                        ring.setAttribute("opacity", 0.5);
                        // highlight connected edges
                        highlightEdges(node.id, 0.85);
                    });
                    grp.addEventListener("mouseleave", () => {
                        if (selectedNode === node.id) return;
                        circle.setAttribute("r", 20);
                        ring.setAttribute("opacity", 0);
                        resetEdges();
                    });
                    grp.addEventListener("click", (ev) => {
                        ev.stopPropagation();
                        selectNode(node);
                    });
                });

                function highlightEdges(nodeId, op) { MapUtils.highlightEdges(edges, edgeEls, nodeId, op, 0.08); }
                function resetEdges() { MapUtils.resetEdges(edges, edgeEls, 0.4); }

                function selectNode(node) {
                    // deselect old
                    if (selectedNode && nodeEls[selectedNode]) {
                        nodeEls[selectedNode].circle.setAttribute("r", 20);
                        nodeEls[selectedNode].ring.setAttribute("opacity", 0);
                        nodeEls[selectedNode].circle.setAttribute(
                            "stroke-width",
                            1.5,
                        );
                    }
                    if (selectedNode === node.id) {
                        selectedNode = null;
                        resetEdges();
                        closeInfo();
                        return;
                    }
                    selectedNode = node.id;
                    nodeEls[node.id].circle.setAttribute("r", 24);
                    nodeEls[node.id].ring.setAttribute("opacity", 0.8);
                    nodeEls[node.id].circle.setAttribute("stroke-width", 2.5);
                    highlightEdges(node.id, 0.9);

                    // info panel
                    document.getElementById("info-name").textContent = node.label;
                    document.getElementById("info-role").textContent = node.role;
                    document.getElementById("info-desc").textContent = node.desc;
                    const obrasList = document.getElementById("info-obras-list");
                    obrasList.innerHTML = node.obras
                        .map((o) => `<span class="obra-tag">${o}</span>`)
                        .join("");
                    document.getElementById("info-panel").classList.add("visible");
                }

                function closeInfo() {
                    document
                        .getElementById("info-panel")
                        .classList.remove("visible");
                    if (selectedNode && nodeEls[selectedNode]) {
                        nodeEls[selectedNode].circle.setAttribute("r", 20);
                        nodeEls[selectedNode].ring.setAttribute("opacity", 0);
                        nodeEls[selectedNode].circle.setAttribute(
                            "stroke-width",
                            1.5,
                        );
                    }
                    selectedNode = null;
                    resetEdges();
                }

                svg.addEventListener("click", () => {
                    closeInfo();
                });

                // ─── PAN & ZOOM ──────────────────────────────────────────────────────────────

                function applyTransform() {
                    g.setAttribute(
                        "transform",
                        `translate(${transform.x},${transform.y}) scale(${transform.scale})`,
                    );
                }

                // Initial center
                const nodesBB = MapUtils.computeBoundingBox(nodes);

                const contentW = nodesBB.maxX - nodesBB.minX + 100;
                const contentH = nodesBB.maxY - nodesBB.minY + 100;
                const initScale =
                    Math.min((W - 60) / contentW, (H - 100) / contentH, 1) * 0.85;
                transform.scale = initScale;
                transform.x =
                    (W - contentW * initScale) / 2 - nodesBB.minX * initScale + 30;
                transform.y =
                    (H - contentH * initScale) / 2 - nodesBB.minY * initScale + 50;
                applyTransform();

                svg.addEventListener("mousedown", (e) => {
                    if (e.target.closest("[data-id]")) return;
                    dragging = true;
                    dragStart = { x: e.clientX, y: e.clientY };
                    transformStart = { ...transform };
                    svg.style.cursor = "grabbing";
                });
                window.addEventListener("mousemove", (e) => {
                    if (!dragging) return;
                    transform.x = transformStart.x + (e.clientX - dragStart.x);
                    transform.y = transformStart.y + (e.clientY - dragStart.y);
                    applyTransform();
                });
                window.addEventListener("mouseup", () => {
                    dragging = false;
                    svg.style.cursor = "default";
                });
                svg.addEventListener(
                    "wheel",
                    (e) => {
                        e.preventDefault();
                        const factor = e.deltaY < 0 ? 1.1 : 0.91;
                        const mx = e.clientX,
                            my = e.clientY;
                        transform.x = mx - (mx - transform.x) * factor;
                        transform.y = my - (my - transform.y) * factor;
                        transform.scale *= factor;
                        applyTransform();
                    },
                    { passive: false },
                );

                // touch
                let lastTouch = null;
                svg.addEventListener(
                    "touchstart",
                    (e) => {
                        if (e.touches.length === 1) {
                            dragging = true;
                            lastTouch = {
                                x: e.touches[0].clientX,
                                y: e.touches[0].clientY,
                            };
                            transformStart = { ...transform };
                            dragStart = { ...lastTouch };
                        }
                    },
                    { passive: true },
                );
                svg.addEventListener(
                    "touchmove",
                    (e) => {
                        if (!dragging || e.touches.length !== 1) return;
                        const t = e.touches[0];
                        transform.x = transformStart.x + (t.clientX - dragStart.x);
                        transform.y = transformStart.y + (t.clientY - dragStart.y);
                        applyTransform();
                    },
                    { passive: true },
                );
                svg.addEventListener("touchend", () => {
                    dragging = false;
                });

                function resetView() {
                    transform.scale = initScale;
                    transform.x =
                        (W - contentW * initScale) / 2 -
                        nodesBB.minX * initScale +
                        30;
                    transform.y =
                        (H - contentH * initScale) / 2 -
                        nodesBB.minY * initScale +
                        50;
                    applyTransform();
                }

                function toggleLabels() {
                    showLabels = !showLabels;
                    MapUtils.toggleLabels(nodeEls, showLabels, 0.6);
                }

                window.resetView = resetView;
                window.toggleLabels = toggleLabels;
                window.closeInfo = closeInfo;
        
                })
                .catch(err => console.error('Erro ao carregar dados do mapa:', err));
</script>
    </body>
</html>
